<VirtualHost *:30000>
	    ServerName lab-b.local

	    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Original-URL}i\" \"%{X-Forwarded-For}i\"" combined_waf
	    CustomLog /usr/local/apache2/logs/access_log combined_waf
	    ErrorLog /usr/local/apache2/logs/error_log

    ProxyRequests Off
    ProxyPreserveHost On

    <IfModule security2_module>
        SecRuleEngine On
        SecRequestBodyAccess On
    </IfModule>

    RewriteEngine On
    RewriteCond %{HTTP:X-Original-URL} .+
    RewriteRule ^.*$ %{HTTP:X-Original-URL} [PT,L]

	    ProxyPass /public/ !
	    Alias /public/ /usr/local/apache2/htdocs/public/
	    <Directory /usr/local/apache2/htdocs/public/>
	        Require all granted
	    </Directory>

	    ProxyPass / http://127.0.0.1:3000/
	    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>
