# Lab-B custom ModSecurity rules
# Intentionally vulnerable configuration for training purposes

# Log presence of routing header (misapplied trust)
SecRule REQUEST_HEADERS:X-Original-URL ".+" \
    "id:100000,phase:1,pass,log,msg:'WAF: X-Original-URL header present'"

# Block direct admin and admin API access by path
SecRule REQUEST_URI "@rx ^/(admin|rest/admin)" \
    "id:100010,phase:1,deny,status:403,msg:'WAF: admin path blocked'"

# Simulated firewall ACL: internal endpoints require internal source IP.
# Intentionally naive: trusts X-Forwarded-For and blocks when header is missing or not in 10.0.0.0/8.
SecRule REQUEST_URI|REQUEST_HEADERS:X-Original-URL "@beginsWith /internal" \
    "id:100021,phase:1,deny,status:403,msg:'ACL: internal-only resource (missing XFF)',chain"
SecRule &REQUEST_HEADERS:X-Forwarded-For "@eq 0"

SecRule REQUEST_URI|REQUEST_HEADERS:X-Original-URL "@beginsWith /internal" \
    "id:100020,phase:1,deny,status:403,msg:'ACL: internal-only resource',chain"
SecRule REQUEST_HEADERS:X-Forwarded-For "!@rx ^10\\."

# For the search training endpoint, disable generic CRS SQLi detection so the lab uses only the naive rule below.
SecRule REQUEST_URI "@beginsWith /rest/products/search" \
    "id:100025,phase:1,pass,nolog,ctl:ruleRemoveByTag=attack-sqli"

# Level 1 (intentional bypass): naive SQLi keyword filter applied to search queries
# Blocks only the '+' form (common URL-encoded space), allowing easy evasion with %20, %09, case changes, etc.
SecRule REQUEST_URI "@beginsWith /rest/products/search" \
    "id:100030,phase:1,deny,status:403,msg:'WAF: naive SQLi pattern blocked (union+select)',chain"
SecRule QUERY_STRING "@contains union+select"
