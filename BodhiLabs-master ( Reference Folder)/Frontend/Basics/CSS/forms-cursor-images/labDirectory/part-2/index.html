<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Artifacts Exhibit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="exhibit-container">
        <h1>The Lost Treasures of CSS</h1>
        <p>Hover your mouse over the artifacts below to see your work in action.</p>
        
        <div class="artifact-display">
            <div class="artifact" id="draggable-gem">Draggable Gemstone</div>
            <div class="artifact" id="locked-casket">Locked Casket</div>
            <div class="artifact" id="help-scroll">Help Scroll (?)</div>
            <div class="artifact" id="text-plaque">Read Inscription</div>
            <button class="artifact" id="activate-mechanism">Activate Mechanism</button>
            <div class="artifact" id="map-grid">Targeting Grid</div>
        </div>
    </div>
</body>
</html>
