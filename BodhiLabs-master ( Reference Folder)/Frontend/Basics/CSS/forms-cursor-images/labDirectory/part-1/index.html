<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>C.S.S. Agency Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form action="#submitted" class="spy-form">
            <fieldset>
                <legend>Agent Credentials</legend>
                
                <label for="codename">Codename:</label>
                <input type="text" id="codename" name="codename">
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
            </fieldset>

            <fieldset>
                <legend>Mission Report</legend>
                <label for="report">Detail your most impressive act of espionage:</label>
                <textarea id="report" name="report" rows="6"></textarea>
            </fieldset>

            <button type="submit">Transmit Application</button>
        </form>
    </div>
</body>
</html>
