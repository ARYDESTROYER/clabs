<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="gallery">
      <div class="gallery-item" data-image="images/img_5terre.jpg">
        <img src="images/img_5terre.jpg" alt="5terre" />
      </div>
      <div class="gallery-item" data-image="images/img_forest.jpg">
        <img src="images/img_forest.jpg" alt="Forest" />
      </div>
      <div class="gallery-item" data-image="images/img_lights.jpg">
        <img src="images/img_lights.jpg" alt="Lights" />
      </div>
      <div class="gallery-item" data-image="images/img_mountains.jpg">
        <img src="images/img_mountains.jpg" alt="Mountains" />
      </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-image" src="" alt="Enlarged Image" />
    </div>

    <script src="jquery.js"></script>
    <script src="script.js"></script>
  </body>
</html>
