{% extends "base.html" %}

{% block title %}Register - TechStore{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 1.5rem;">Create Account</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Username:</label>
                <input type="text" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Email:</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Password:</label>
                <input type="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem;">
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: #7f8c8d;">
            Already have an account? <a href="/login" style="color: #3498db;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
